<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Visitor Management</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Hostel Visitor Management System</h1>
        <nav>
            <a th:href="@{/request}">Request Visit</a>
            <a th:href="@{/approvals}">Approvals</a>
            <a th:href="@{/entry}">Allow Entry</a>
            <a th:href="@{/exit}">Record Exit</a>
            <a th:href="@{/logs}">Visitor Logs</a>
            <a th:href="@{/reports}">Reports</a>
        </nav>
    </header>

    <section class="card">
        <h2>Dashboard</h2>
        <div class="grid">
            <div class="metric"><strong th:text="${requestCount}">0</strong>Total Requests</div>
            <div class="metric"><strong th:text="${approvedCount}">0</strong>Approved</div>
            <div class="metric"><strong th:text="${entryCount}">0</strong>Entries Allowed</div>
            <div class="metric"><strong th:text="${exitCount}">0</strong>Exits Recorded</div>
        </div>
    </section>
</div>
</body>
</html>
